defaults:
  - default_dataset.yaml
  - _self_

exp_name: radial_camera_co3d_aug
img_size: 518
num_workers: 4
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 1
max_img_per_gpu: 17

limit_train_batches: 100
limit_val_batches: 20

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
      inside_random: False
      img_nums: [2, 12]
      augs:
        radial_distortion:
          enabled: True
          synthetic_from_zero: True
          p: 0.5
          delta_range: [-0.05, 0.05]
          shared: True
          clamp_range: [-0.3, 0.3]
          num_iters: 8
          padding_mode: border
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: train
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION
          len_train: 100000
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      inside_random: False
      img_nums: [2, 12]
      augs:
        radial_distortion:
          enabled: True
          synthetic_from_zero: True
          p: 0.5
          delta_range: [-0.05, 0.05]
          shared: True
          clamp_range: [-0.3, 0.3]
          num_iters: 8
          padding_mode: border
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.co3d.Co3dDataset
          split: test
          CO3D_DIR: /YOUR/PATH/TO/CO3D
          CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION
          len_test: 10000

logging:
  log_dir: logs/${exp_name}
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_k1
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_k1

checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 1
  resume_checkpoint_path: /YOUR/PATH/TO/VGGT_PRETRAINED.pt
  strict: False
  load_optimizer: False

loss:
  _target_: loss.MultitaskLoss
  camera:
    weight: 5.0
    loss_type: "l1"
    pose_encoding_type: "absT_quaR_FoV_k1"
    weight_trans: 1.0
    weight_rot: 1.0
    weight_focal: 0.5
    weight_k1: 0.1
  depth: null
  point: null
  track: null

optim:
  param_group_modifiers: False
  optimizer:
    _target_: torch.optim.AdamW
    lr: 3e-6
    weight_decay: 0.01
  frozen_module_names:
    - "*aggregator*"
  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["camera"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 3e-6
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.01

max_epochs: 5

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: False
  enable_point: False
  enable_track: False
  camera_pose_encoding_type: "absT_quaR_FoV_k1"

distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
